name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'plugins/**'
      - 'App.tsx'
      - 'index.ts'
      - 'app.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate android project
        run: npx expo prebuild --platform android --no-install

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore

      - name: Build signed release APK
        working-directory: android
        env:
          # storeFile is resolved relative to android/app by the module build.gradle
          TOMO_UPLOAD_STORE_FILE: upload.keystore
          TOMO_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TOMO_UPLOAD_KEY_ALIAS: tomo
          TOMO_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Publish APK to App Service
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
        run: |
          # Trailing slash PUT creates the directory; tolerate failure when it already exists.
          curl -sf -X PUT -u "$KUDU_USER:$KUDU_PASS" \
            'https://ht6-tomoyard.scm.azurewebsites.net/api/vfs/data/apk/' || true
          curl -sf -X PUT -u "$KUDU_USER:$KUDU_PASS" -H 'If-Match: *' \
            --data-binary @android/app/build/outputs/apk/release/app-release.apk \
            'https://ht6-tomoyard.scm.azurewebsites.net/api/vfs/data/apk/tomo-yard.apk'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tomo-yard-apk
          path: android/app/build/outputs/apk/release/app-release.apk
